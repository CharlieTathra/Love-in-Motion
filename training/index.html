<style>
  :root{
    --cream:#f7f1ea; --cream-2:#f1e8dd; --surface:#fffdfb;
    --ink:#312824; --ink-soft:#6d5f57; --ink-faint:#9c8d83;
    --rose:#b9536a; --rose-deep:#8f3a50; --rose-wash:#f4e3e4;
    --euc:#74866d; --euc-wash:#e7ecdf;
    --lilac-wash:#efe2ea;
    --line:#e8ddd0; --line-soft:#efe6da;
    --shadow:0 1px 2px rgba(49,40,36,.04),0 8px 24px rgba(49,40,36,.06);
    --shadow-lg:0 10px 40px rgba(49,40,36,.16);
    --serif:'Fraunces',Georgia,'Iowan Old Style',serif;
    --sans:'Hanken Grotesk',system-ui,-apple-system,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--cream);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{max-width:520px;margin:0 auto;min-height:100vh;
    background:
      radial-gradient(120% 60% at 100% 0%, var(--cream-2) 0%, transparent 60%),
      var(--cream);
    padding:0 18px calc(88px + env(safe-area-inset-bottom));position:relative}
  ::selection{background:var(--rose-wash)}
  a{color:inherit;text-decoration:none}

  /* header */
  header{padding:30px 4px 14px;position:sticky;top:0;z-index:5;
    background:linear-gradient(var(--cream) 72%, transparent);}
  .back{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
    color:var(--ink-faint);margin-bottom:12px}
  .back .a{font-size:16px;line-height:1}
  .brand{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
  .brand h1{font-family:var(--serif);font-weight:500;font-size:25px;
    letter-spacing:-.01em;line-height:1}
  .brand .heart{color:var(--rose);font-size:20px;transform:translateY(1px)}
  .tag{font-size:11.5px;letter-spacing:.13em;text-transform:uppercase;
    color:var(--ink-faint);margin-top:7px;font-weight:500}

  /* countdown */
  .count{margin-top:16px;background:var(--surface);border:1px solid var(--line);
    border-radius:16px;padding:15px 17px;display:flex;align-items:center;
    gap:14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .count::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;
    background:linear-gradient(var(--rose),var(--euc))}
  .count .n{font-family:var(--serif);font-size:34px;font-weight:600;
    color:var(--rose-deep);line-height:.9;font-variant-numeric:tabular-nums}
  .count .lab{font-size:12.5px;color:var(--ink-soft);line-height:1.35}
  .count .lab b{color:var(--ink);font-weight:600}

  /* controls */
  .controls{margin-top:20px}
  .weeks{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;
    scrollbar-width:none;-ms-overflow-style:none}
  .weeks::-webkit-scrollbar{display:none}
  .wk{flex:1 1 0;border:1px solid var(--line);background:var(--surface);
    border-radius:11px;padding:9px 10px;font-size:13px;font-weight:600;
    color:var(--ink-soft);cursor:pointer;transition:.18s;white-space:nowrap;text-align:center}
  .wk .wd{display:block;font-size:10px;font-weight:500;color:var(--ink-faint);
    margin-top:2px;letter-spacing:.02em}
  .wk[aria-selected="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
  .wk[aria-selected="true"] .wd{color:rgba(255,255,255,.6)}

  .plans{display:flex;gap:5px;margin-top:14px;background:var(--cream-2);
    border-radius:13px;padding:4px}
  .plan{flex:1;border:0;background:transparent;border-radius:10px;padding:9px 6px;
    cursor:pointer;font-family:var(--sans);font-size:12.5px;font-weight:600;
    color:var(--ink-soft);transition:.18s;text-align:center}
  .plan span{display:block;font-size:10px;font-weight:500;color:var(--ink-faint);margin-top:1px}
  .plan[aria-selected="true"]{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}
  .plan[aria-selected="true"] span{color:var(--rose-deep)}

  /* head */
  .whead{margin:24px 2px 4px}
  .whead .focus{font-family:var(--serif);font-size:21px;font-weight:500;letter-spacing:-.01em}
  .whead .dates{font-size:12.5px;color:var(--ink-faint);margin-top:3px;letter-spacing:.02em}
  .prog{margin-top:14px;display:flex;align-items:center;gap:11px}
  .bar{flex:1;height:7px;background:var(--cream-2);border-radius:99px;overflow:hidden}
  .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--euc),var(--rose));
    border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
  .prog .pt{font-size:11.5px;color:var(--ink-soft);font-weight:600;white-space:nowrap}

  /* cards */
  .list{margin-top:16px;display:flex;flex-direction:column;gap:10px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:15px;
    padding:14px 15px;display:flex;align-items:center;gap:13px;cursor:pointer;
    box-shadow:var(--shadow);transition:.16s;
    animation:rise .5s cubic-bezier(.2,.7,.2,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(9px)}}
  .card:active{transform:scale(.985)}
  .card.done{background:var(--cream);border-color:var(--line-soft)}
  .check{flex:0 0 auto;width:26px;height:26px;border-radius:50%;
    border:1.6px solid var(--line);display:grid;place-items:center;
    transition:.18s;background:#fff}
  .check svg{width:13px;height:13px;stroke:#fff;stroke-width:2.6;fill:none;
    stroke-linecap:round;stroke-linejoin:round;opacity:0;transform:scale(.4);transition:.18s}
  .card.done .check{background:var(--euc);border-color:var(--euc)}
  .card.done .check svg{opacity:1;transform:scale(1)}
  .meta{flex:1;min-width:0}
  .meta .t{font-size:14.5px;font-weight:600;letter-spacing:-.01em}
  .card.done .meta .t{color:var(--ink-soft)}
  .meta .s{font-size:12.5px;color:var(--ink-soft);margin-top:2px;line-height:1.4}
  .pill{flex:0 0 auto;font-size:9.5px;font-weight:600;letter-spacing:.08em;
    text-transform:uppercase;padding:4px 8px;border-radius:99px}
  .pill.easy{background:var(--euc-wash);color:var(--euc)}
  .pill.long{background:var(--rose-wash);color:var(--rose-deep)}
  .pill.qual{background:var(--lilac-wash);color:var(--rose-deep)}
  .pill.str{background:var(--cream-2);color:var(--ink-soft)}
  .pill.rest{background:var(--cream-2);color:var(--ink-faint)}
  .pill.cross{background:var(--euc-wash);color:var(--euc)}
  .chev{flex:0 0 auto;color:var(--ink-faint);font-size:18px;line-height:1}

  .cnote{margin-top:13px;font-size:12px;color:var(--ink-faint);text-align:center;
    line-height:1.5;padding:0 10px}

  /* coach notes */
  .notes{margin-top:30px;border-top:1px solid var(--line);padding-top:8px}
  .notes>summary{font-family:var(--serif);font-size:17px;font-weight:500;
    padding:14px 2px;cursor:pointer;list-style:none;display:flex;
    align-items:center;justify-content:space-between}
  .notes>summary::-webkit-details-marker{display:none}
  .notes>summary .x{color:var(--ink-faint);font-size:20px;transition:.2s}
  .notes[open]>summary .x{transform:rotate(45deg)}
  details.sub{border:1px solid var(--line);border-radius:13px;background:var(--surface);
    margin-bottom:9px;overflow:hidden}
  details.sub>summary{padding:13px 15px;cursor:pointer;font-size:13.5px;font-weight:600;
    list-style:none;display:flex;align-items:center;justify-content:space-between}
  details.sub>summary::-webkit-details-marker{display:none}
  details.sub>summary .x{color:var(--ink-faint);transition:.2s}
  details.sub[open]>summary .x{transform:rotate(90deg)}
  details.sub[open]>summary{border-bottom:1px solid var(--line-soft)}
  .body{padding:13px 15px;font-size:13px;line-height:1.62;color:var(--ink-soft)}
  .body p+p{margin-top:9px}
  .body b{color:var(--ink);font-weight:600}
  .body ul{list-style:none;margin-top:4px}
  .body li{padding:5px 0 5px 17px;position:relative}
  .body li::before{content:"";position:absolute;left:0;top:12px;width:5px;height:5px;
    border-radius:50%;background:var(--rose)}
  .ex li::before{background:var(--euc)}

  footer{text-align:center;margin-top:34px;padding-top:18px;border-top:1px solid var(--line)}
  footer .fm{font-family:var(--serif);font-style:italic;font-size:14.5px;color:var(--rose-deep)}
  footer .fs{font-size:11px;color:var(--ink-faint);margin-top:6px;letter-spacing:.04em}
  .sig{margin-top:17px;display:flex;align-items:center;justify-content:center;gap:11px}
  .sig::before,.sig::after{content:"";height:1px;width:30px;background:var(--line)}
  .sig-mark{font-family:var(--serif);font-weight:500;font-size:15px;letter-spacing:.34em;
    text-transform:uppercase;color:var(--ink);padding-left:.34em}

  /* bottom tab bar */
  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:15;max-width:520px;margin:0 auto;
    display:flex;gap:2px;background:rgba(255,253,251,.92);
    -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
    border-top:1px solid var(--line);padding:7px 8px calc(7px + env(safe-area-inset-bottom))}
  .tabbar .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    text-decoration:none;color:var(--ink-faint);font-size:10px;font-weight:600;
    letter-spacing:.02em;padding:5px 2px;border-radius:11px;transition:.15s}
  .tabbar .tab .ic{font-size:18px;line-height:1}
  .tabbar .tab:active{background:var(--cream-2)}
  .tabbar .tab[aria-current="page"]{color:var(--rose-deep)}

  /* sheet */
  .scrim{position:fixed;inset:0;background:rgba(49,40,36,.34);opacity:0;
    pointer-events:none;transition:.25s;z-index:20;backdrop-filter:blur(2px)}
  .scrim.on{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:21;max-width:520px;margin:0 auto;
    background:var(--surface);border-radius:24px 24px 0 0;padding:8px 20px
    calc(26px + env(safe-area-inset-bottom));transform:translateY(102%);
    transition:transform .3s cubic-bezier(.3,.8,.3,1);box-shadow:var(--shadow-lg);
    max-height:86vh;overflow-y:auto}
  .sheet.on{transform:translateY(0)}
  .grab{width:38px;height:4px;border-radius:99px;background:var(--line);margin:8px auto 16px}
  .sheet .st{font-family:var(--serif);font-size:22px;font-weight:500;letter-spacing:-.01em}
  .sheet .ss{font-size:13px;color:var(--ink-soft);margin-top:4px}
  .blk{margin-top:18px}
  .blk h4{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--rose-deep);font-weight:600;margin-bottom:7px}
  .blk p{font-size:13.5px;line-height:1.6;color:var(--ink-soft)}
  .blk p b{color:var(--ink)}
  .callout{background:var(--euc-wash);border-radius:13px;padding:13px 15px;margin-top:6px}
  .callout p{color:#4f5a48}
  .fuelh{display:flex;align-items:center;justify-content:space-between;gap:12px;
    margin-top:6px;background:var(--rose-wash);border-radius:13px;padding:13px 15px}
  .fuelh p{font-size:13px;color:var(--rose-deep);line-height:1.45}
  .fuelh .go{flex:0 0 auto;font-size:12px;font-weight:600;color:var(--rose-deep);white-space:nowrap}
  .dobtn{margin-top:22px;width:100%;border:0;border-radius:14px;padding:15px;
    font-family:var(--sans);font-size:14.5px;font-weight:600;cursor:pointer;
    background:var(--ink);color:#fff;transition:.18s}
  .dobtn.is-done{background:var(--euc-wash);color:var(--euc)}
  .dobtn:active{transform:scale(.99)}

  /* exercise prescription list (strength sessions) */
  .exlist{margin-top:2px}
  .exrow{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;
    padding:11px 0;border-bottom:1px solid var(--line-soft)}
  .exrow:last-child{border-bottom:0}
  .exrow:first-child{padding-top:4px}
  .ex-l{min-width:0}
  .exrow .en{font-size:14px;font-weight:600;color:var(--ink);letter-spacing:-.01em}
  .exrow .ec{font-size:12.5px;color:var(--ink-soft);margin-top:3px;line-height:1.5}
  .exrow .ed{flex:0 0 auto;font-size:12.5px;font-weight:600;color:var(--rose-deep);
    white-space:nowrap;text-align:right;background:var(--rose-wash);border-radius:8px;
    padding:5px 9px;letter-spacing:.01em}

  /* week sub-tabs (days/weeks within a block) */
  .weeks2{display:flex;gap:7px;overflow-x:auto;margin-top:15px;padding-bottom:3px;
    scrollbar-width:none;-ms-overflow-style:none}
  .weeks2::-webkit-scrollbar{display:none}
  .w2{flex:0 0 auto;border:1px solid var(--line);background:var(--surface);
    border-radius:10px;padding:7px 14px;font-size:12.5px;font-weight:600;
    color:var(--ink-soft);cursor:pointer;transition:.16s;white-space:nowrap;
    font-family:var(--sans)}
  .w2 .wn{display:block;font-size:9px;font-weight:500;color:var(--ink-faint);
    margin-top:1px;letter-spacing:.04em;text-transform:uppercase}
  .w2[aria-selected="true"]{background:var(--rose);color:#fff;border-color:var(--rose);
    box-shadow:var(--shadow)}
  .w2[aria-selected="true"] .wn{color:rgba(255,255,255,.65)}
  .w2.add{color:var(--rose-deep);border-style:dashed;border-color:var(--line);
    padding:7px 13px;font-size:15px;line-height:1.1}

  /* tiny "has note" marker on a session card */
  .hasnote{display:inline-flex;align-items:center;gap:4px;margin-top:4px;
    font-size:11px;font-weight:600;color:var(--rose-deep);letter-spacing:.01em}

  /* week training-notes card */
  .notewrap{margin-top:18px}
  .notecard{background:var(--surface);border:1px solid var(--line);border-radius:15px;
    padding:14px 15px;box-shadow:var(--shadow)}
  .notecard .nh{display:flex;align-items:center;justify-content:space-between;
    margin-bottom:9px}
  .notecard .nh h4{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--rose-deep);font-weight:600}
  .savednote{font-size:11px;color:var(--ink-faint);font-weight:500;letter-spacing:.02em;
    opacity:0;transition:.25s}
  .savednote.on{opacity:1}
  textarea.note{width:100%;border:1px solid var(--line);border-radius:11px;
    background:var(--cream);padding:11px 12px;font-family:var(--sans);font-size:13.5px;
    line-height:1.55;color:var(--ink);resize:vertical;min-height:88px;transition:.16s}
  textarea.note:focus{outline:none;border-color:var(--rose);background:#fff}
  textarea.note::placeholder{color:var(--ink-faint)}
  .rmweek{background:none;border:0;color:var(--ink-faint);font-size:11.5px;font-weight:600;
    cursor:pointer;margin-top:11px;padding:3px 0;letter-spacing:.02em;font-family:var(--sans)}
  .rmweek:active{color:var(--rose-deep)}
</style>
</head>

<script>
"use strict";

/* ---------- safe storage (works offline as a file; never crashes) ---------- */
var store=window.LIMStorage
  ? window.LIMStorage.create("app",function(){if(typeof render==="function")render();})
  : (function(){var mem={},ok=false;
      try{localStorage.setItem('__t','1');localStorage.removeItem('__t');ok=true;}catch(e){ok=false;}
      return{get:function(k){try{return ok?JSON.parse(localStorage.getItem(k)):mem[k];}catch(e){return mem[k];}},
             set:function(k,v){try{ok?localStorage.setItem(k,JSON.stringify(v)):mem[k]=v;}catch(e){mem[k]=v;}}};})();

/* ---------- shared guidance ---------- */
var EASY="Easy means conversational - you could chat the whole way, nose-breathing, no strain. Most of your running lives here. It feels too slow; that's the point. Easy running is what builds the engine without breaking you down.";
var LONGRUN="The long run is the heart of ultra training. Build it gradually - no jump bigger than ~10-15% week to week. Keep the pace easy, walk the hills early, and practise eating and drinking on the move every single time.";

/* session builders */
function easy(t,s,detail){return{k:"easy",pill:"Easy",t:t,s:s,detail:detail};}
function long(t,s,detail){return{k:"long",pill:"Long",t:t,s:s,detail:detail,fuelit:true};}
function qual(t,s,detail){return{k:"qual",pill:"Quality",t:t,s:s,detail:detail};}
function str(t,s,detail,exs){return{k:"str",pill:"Strength",t:t,s:s,detail:detail,exs:exs};}
function cross(t,s,detail){return{k:"cross",pill:"Cross",t:t,s:s,detail:detail};}
function rest(t,s,detail){return{k:"rest",pill:"Rest",t:t,s:s,detail:detail};}

/* ---------- phases × plans ---------- */
var PHASES=[
 {name:"Base",sub:"8–7 wks",line:"Build the aerobic engine. Mostly easy running, one longer day, and the first back-to-back. Consistency beats heroics here.",
  A:[
    easy("Easy run","40–50 min, flat and relaxed","Pure aerobic time on feet. Keep it conversational the whole way. If in doubt, slow down - this run builds the base everything else sits on."),
    qual("Hills (easy)","6–8 × short hill strides on a gentle climb","Run up strong but controlled for ~20–30 sec, walk down to recover. Builds strength and trail-specific power without the pounding of speedwork. Stop while it still feels good."),
    str("Strength","2×/week · foundation phase · 2–3 sets, 10–15 reps","This is the foundation phase: teach the movements and build tissue tolerance before you load them heavy in the Build block. Keep 2–3 reps in reserve on every set, move with control (a slow 3-second lower), and add weight only once form is perfect across all sets. Two short sessions a week, on easy-run days, after you run.",
      [["Goblet squat","3 × 12","Hold a dumbbell or kettlebell at the chest. Sit between the hips, knees tracking over the toes, 3-sec lower."],

 {name:"Build",sub:"6–4 wks",line:"The long runs stretch out and the trail gets specific - more climbing, more time on feet, back-to-backs that bite. This is where the 60 km gets built.",

    str("Strength + downhill","Heavy day · 3–5 reps @ ~80–85% 1RM · 3–4 sets + downhill","This is where strength is built. Go genuinely heavy - about 80–85% of your one-rep max, 3–5 reps, long 2–3 minute rests, and never to failure (leave 1–2 reps in the tank). Heavy lifting is proven to improve running economy, so the same effort carries you further on race day. Lift on an easy-run day and keep it separate enough from the long run that neither suffers.",

       ["Bulgarian split squat","3 × 6 / leg","Weighted. The most race-specific lift for trail - control the descent, own the single leg."],
       ["Weighted single-leg calf raise","3 × 8 / leg","Hold a dumbbell. Stiff, strong calves protect the Achilles on K2PD's hills."],
       ["Eccentric downhill running","4–6 × 30–60 sec","On a moderate descent: quick, light steps, let gravity work. Trains the quads to absorb downhill load so race-day descents don't trash them."],

 {name:"Peak",sub:"3–2 wks",line:"The biggest weeks - your longest back-to-back and the most race-specific running. Then you've done the work. Nothing you do now makes you fitter for race day except arriving healthy.",

       ["Squat or box jumps","3 × 5","Land soft and quiet, fully recover between sets. A little power, never to fatigue."],

  ],

 {name:"Taper",sub:"final 10 days",line:"Volume drops, sharpness stays. You can't gain fitness now - only lose freshness. Trust the work, sleep well, eat well, and arrive light, healthy and ready.",
  A:[

var EVENT=new Date(2026,7,23);

/* ---------- state ---------- */
var DEFAULT_WEEKS=[2,3,2,2];          // Base, Build, Peak, Taper
var state={ph:0,plan:store.get("limn_plan")||"A",wk:0};

/* per-(phase,plan) week count - user can add weeks */
function weekCountKey(){return "limn_train_weeks_p"+state.ph+"_"+state.plan;}
function weekCount(){var n=store.get(weekCountKey());return (n&&n>0)?n:DEFAULT_WEEKS[state.ph];}
function setWeekCount(n){store.set(weekCountKey(),n);}

/* per-week done map (with one-time migration of legacy pre-week data into week 1) */
function doneKey(){return "limn_train_p"+state.ph+"_"+state.plan+"_w"+state.wk;}
function getDone(){
  var v=store.get(doneKey());
  if(v)return v;
  if(state.wk===0){var legacy=store.get("limn_train_p"+state.ph+"_"+state.plan);
    if(legacy){store.set(doneKey(),legacy);return legacy;}}
  return {};
}
function setDone(o){store.set(doneKey(),o);}

/* per-week training notes + per-session notes */
function weekNoteKey(){return "limn_train_note_p"+state.ph+"_"+state.plan+"_w"+state.wk;}
function getWeekNote(){return store.get(weekNoteKey())||"";}
function setWeekNote(t){store.set(weekNoteKey(),t);}
function sessNoteKey(i){return "limn_train_snote_p"+state.ph+"_"+state.plan+"_w"+state.wk+"_s"+i;}
function getSessNote(i){return store.get(sessNoteKey(i))||"";}
function setSessNote(i,t){store.set(sessNoteKey(i),t);}

/* ---------- render ---------- */
function cards(){return PHASES[state.ph][state.plan]||[];}

function renderCount(){
  var ms=EVENT-new Date();var d=Math.max(0,Math.ceil(ms/86400000));
  document.getElementById("cd").textContent=d;
  if(d===0)document.getElementById("cdl").innerHTML="<b>Today is the day</b><br>Kuranda &rarr; Port Douglas";
}
function renderPhases(){
  var w=document.getElementById("phases");w.innerHTML="";
  PHASES.forEach(function(p,i){
    var b=document.createElement("button");
    b.className="wk";b.setAttribute("aria-selected",i===state.ph);
    b.innerHTML=p.name+"<span class='wd'>"+p.sub+"</span>";
    b.onclick=function(){state.ph=i;state.wk=0;render();};
    w.appendChild(b);
  });
}
function renderWeeks(){
  var w=document.getElementById("weeks2");w.innerHTML="";
  var n=weekCount();
  if(state.wk>=n)state.wk=n-1;
  for(var i=0;i<n;i++){(function(i){
    var b=document.createElement("button");
    b.className="w2";b.setAttribute("aria-selected",i===state.wk);
    b.setAttribute("role","tab");
    b.innerHTML="Week "+(i+1)+"<span class='wn'>"+PHASES[state.ph].name+"</span>";
    b.onclick=function(){state.wk=i;render();};
    w.appendChild(b);
  })(i);}
  var add=document.createElement("button");
  add.className="w2 add";add.textContent="+";
  add.setAttribute("aria-label","Add a week to this block");
  add.title="Add a week";
  add.onclick=function(){var c=weekCount()+1;setWeekCount(c);state.wk=c-1;render();};
  w.appendChild(add);
}
function renderPlans(){
  document.querySelectorAll(".plan").forEach(function(p){
    p.setAttribute("aria-selected",p.dataset.p===state.plan);
    p.onclick=function(){state.plan=p.dataset.p;store.set("limn_plan",state.plan);render();};
  });
}
function renderHead(){
  var p=PHASES[state.ph];
  document.getElementById("focus").textContent=p.name+" phase";
  document.getElementById("dates").textContent=p.line;
  var cs=cards(),done=getDone();
  var n=cs.length,c=0;for(var i=0;i<n;i++){if(done[i])c++;}
  document.getElementById("bar").style.width=n?(c/n*100)+"%":"0%";
  document.getElementById("pt").textContent=c+" of "+n+" done";
}
function pillClass(k){return k;}
function renderList(){
  var list=document.getElementById("list");list.innerHTML="";
  var cs=cards(),done=getDone();
  cs.forEach(function(s,i){
    var card=document.createElement("div");
    card.className="card"+(done[i]?" done":"");
    card.style.animationDelay=(i*55)+"ms";
    var noteMark=getSessNote(i)?"<div class='hasnote'>&#9998; Note saved</div>":"";
    card.innerHTML=
      "<div class='check' aria-hidden='true'><svg viewBox='0 0 24 24'><polyline points='4 12 10 18 20 6'/></svg></div>"+
      "<div class='meta'><div class='t'>"+s.t+"</div><div class='s'>"+s.s+"</div>"+noteMark+"</div>"+
      "<span class='pill "+pillClass(s.k)+"'>"+s.pill+"</span>"+
      "<span class='chev'>&rsaquo;</span>";
    card.setAttribute("role","button");
    card.setAttribute("tabindex","0");
    card.setAttribute("aria-label",s.t+" — "+s.s+". "+(done[i]?"Done.":"Not done.")+" Open for details.");
    card.querySelector(".check").onclick=function(e){e.stopPropagation();toggle(i);};
    card.onclick=function(){openSheet(i);};
    card.onkeydown=function(e){if(e.key==="Enter"||e.key===" "){e.preventDefault();openSheet(i);}};
    list.appendChild(card);
  });
  var cn=document.getElementById("cnote"),lead;
  if(allIn())lead="Phase complete - beautiful work. ";
  else if(state.plan==="C")lead="This week, showing up gently is enough. Fitness keeps; you come first. ";
  else if(state.plan==="B")lead="Protect the long run; let the rest flex around your week. ";
  else lead="";
  cn.textContent=lead+"Run easy on easy days so the hard days can be hard - and fuel every long run.";
}
function allIn(){var cs=cards(),done=getDone();if(!cs.length)return false;for(var i=0;i<cs.length;i++){if(!done[i])return false;}return true;}
function toggle(i){var d=getDone();d[i]=!d[i];setDone(d);renderHead();renderList();}

/* ---------- week training notes ---------- */
function flashSaved(el){if(!el)return;el.classList.add("on");
  clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove("on");},1400);}
function renderNotes(){
  var wrap=document.getElementById("notewrap");wrap.innerHTML="";
  var card=document.createElement("div");card.className="notecard";
  var canRemove=weekCount()>DEFAULT_WEEKS[state.ph]&&state.wk===weekCount()-1;
  card.innerHTML=
    "<div class='nh'><h4>Training notes &middot; Week "+(state.wk+1)+"</h4>"+
    "<span class='savednote' id='wnsaved'>Saved &#10003;</span></div>"+
    "<textarea class='note' id='wnote' placeholder='How did this week feel? Note your sessions, how the legs are, what to tweak next week…'></textarea>"+
    (canRemove?"<button class='rmweek' id='rmweek'>Remove Week "+(state.wk+1)+"</button>":"");
  wrap.appendChild(card);
  var ta=card.querySelector("#wnote");ta.value=getWeekNote();
  ta.oninput=function(){setWeekNote(ta.value);flashSaved(document.getElementById("wnsaved"));};
  if(canRemove){card.querySelector("#rmweek").onclick=function(){
    if(!confirm("Remove Week "+(state.wk+1)+" and its notes from this block?"))return;
    store.set(doneKey(),null);store.set(weekNoteKey(),null);
    var cs=cards();for(var i=0;i<cs.length;i++)store.set(sessNoteKey(i),null);
    setWeekCount(weekCount()-1);state.wk=Math.max(0,state.wk-1);render();
  };}
}

/* ---------- sheet ---------- */
function openSheet(i){
  var s=cards()[i],done=getDone();
  var h="<div class='st'>"+s.t+"</div><div class='ss'>"+s.s+"</div>";
  if(s.exs){
    h+="<div class='blk'><h4>The session</h4><div class='exlist'>";
    s.exs.forEach(function(e){
      h+="<div class='exrow'><div class='ex-l'><div class='en'>"+e[0]+"</div>"+
         (e[2]?"<div class='ec'>"+e[2]+"</div>":"")+"</div><div class='ed'>"+e[1]+"</div></div>";
    });
    h+="</div></div>";
  }
  h+="<div class='blk'><h4>Why &amp; how</h4><p>"+s.detail+"</p></div>";
  if(s.k==="easy"&&state.ph===0)h+="<div class='blk'><h4>What 'easy' means</h4><div class='callout'><p>"+EASY+"</p></div></div>";
  if(s.fuelit)h+="<div class='blk'><h4>Fuel this one</h4><div class='fuelh'><p>Long days are where fuelling is the session. Open the Fuel plan for what to eat before, during and after.</p><a class='go' href='../nutrition-meal-planner/index.html'>Fuel &rsaquo;</a></div></div>";
  if(s.k==="long")h+="<div class='blk'><h4>The long run</h4><p>"+LONGRUN+"</p></div>";
  h+="<div class='blk'><h4>Your workout notes &middot; Week "+(state.wk+1)+"</h4>"+
     "<textarea class='note' id='snote' placeholder='Log this session - distance, time, how it went, how you fuelled, anything to remember…'></textarea>"+
     "<span class='savednote' id='snsaved' style='display:inline-block;margin-top:6px'>Saved &#10003;</span></div>";
  h+="<button class='dobtn"+(done[i]?" is-done":"")+"' id='dobtn'>"+(done[i]?"&#10003; Done - tap to undo":"Mark as done")+"</button>";
  document.getElementById("sheetbody").innerHTML=h;
  var sta=document.getElementById("snote");sta.value=getSessNote(i);
  sta.oninput=function(){setSessNote(i,sta.value);flashSaved(document.getElementById("snsaved"));};
  document.getElementById("dobtn").onclick=function(){toggle(i);
    var b=document.getElementById("dobtn");b.className="dobtn"+(getDone()[i]?" is-done":"");
    b.innerHTML=getDone()[i]?"&#10003; Done - tap to undo":"Mark as done";};
  document.getElementById("scrim").classList.add("on");
  var sheet=document.getElementById("sheet");
  sheet.classList.add("on");
  sheet.setAttribute("aria-label",s.t);
  document.body.style.overflow="hidden";
  sheet.setAttribute("tabindex","-1");sheet.focus();
}
function closeSheet(){document.getElementById("scrim").classList.remove("on");
  document.getElementById("sheet").classList.remove("on");
  document.body.style.overflow="";renderList();}
document.getElementById("scrim").onclick=closeSheet;
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeSheet();});

/* ---------- coach notes ---------- */
function note(title,html){return "<details class='sub'><summary>"+title+"<span class='x'>&rsaquo;</span></summary><div class='body'>"+html+"</div></details>";}
document.getElementById("notesbody").innerHTML=
 note("The 80/20 rule","<p><b>Run easy on easy days so you can run hard on hard days.</b> Roughly 80% of your running should be genuinely easy - conversational, nose-breathing, almost too slow. The other 20% is your hills and race-effort work.</p><p>The most common mistake is running easy days a bit too hard and hard days a bit too soft, so everything blurs into medium. Keep the easy easy and the polarisation does the work.</p>")+
 note("The long run","<p>"+LONGRUN+"</p><ul><li>Build gradually - no weekly jump bigger than ~10–15%.</li><li>Every 3rd–4th week, pull the long run back to let the body absorb the work.</li><li><b>Time on feet</b> matters more than distance or pace on trail.</li><li>Walk the climbs from the start - everyone walks the steep stuff in a 60 km.</li></ul>")+
 note("Hills &amp; trail skills","<ul><li><b>Uphill:</b> shorten your stride, stay relaxed, power-hike anything too steep to run efficiently.</li><li><b>Downhill:</b> practise it - quick light steps, let gravity help. Eccentric load wrecks untrained quads late in a race.</li><li>Train on terrain like K2PD: trail, roots, rock, real gradient.</li><li>Carry and use your race vest on long runs so nothing's new on the day.</li></ul>")+
 note("Heat &amp; humidity","<p>North Queensland in August is warm and humid - respect it. Acclimatise by doing some long runs in the heat of the day in the final 2–3 weeks.</p><ul><li>Slow down - effort, not pace, is the gauge in heat.</li><li>Drink to thirst-plus and add electrolytes (sodium especially).</li><li>Practise everything on long runs so race-day heat is familiar, not a shock.</li></ul><p>The Fuel app's hydration notes pair with this.</p>")+
 note("Strength &amp; durability","<p>Strength work makes you more durable <b>and</b> more economical - heavy lifting is shown to improve running economy, so the same effort carries you further. Build it in phases, just like your running:</p><ul><li><b>Base - foundation:</b> 2×/week. Learn the movements, 2–3 sets of 10–15 reps at a moderate load. Build tissue tolerance first.</li><li><b>Build - max strength:</b> go heavy - 3–5 reps at ~80–85% of your max, 3–4 sets, long rests, never to failure. Add eccentric downhill running for the quads.</li><li><b>Peak - maintain &amp; spring:</b> cut volume right back, keep it crisp, add light plyometrics (pogo hops, low jumps) for elastic power.</li><li><b>Taper:</b> drop the load - light activation and mobility only.</li></ul><p>Prioritise single-leg work (split squats, lunges), the posterior chain (hinges, deadlifts) and the calves - they're your insurance against late-race breakdown on a hilly 60 km. Lift on easy days, after your run, and leave a rep or two in reserve.</p>")+
 note("Recovery &amp; staying healthy","<p>You get fitter while you recover, not while you train. Sleep is the single most powerful tool you have.</p><ul><li>Niggle that changes your gait or worsens day to day = back off and assess early.</li><li>A missed session never costs you the race; training through an injury can.</li><li>Pair training with the Fuel plan - under-fuelling is the quiet saboteur of recovery.</li></ul>")+
 note("Tapering","<p>In the final ~10 days, <b>cut volume but keep a little intensity</b> so the legs stay sharp. You can't build fitness now - you can only arrive fresh or frayed.</p><p>Expect to feel restless, even sluggish or twitchy - that's normal and means it's working. Bank sleep, eat well, and trust the months of work.</p>")+
 note("Race week &amp; the day","<ul><li>Nothing new: shoes, socks, vest, fuel - all tested on long runs.</li><li>Start slower than feels right; walk the early climbs.</li><li>Eat and drink to plan from the first hour, not when you're already empty.</li><li>Break 60 km into chunks - aid station to aid station.</li><li>Run your own race, and remember why you're out there.</li></ul>")+
 note("On the horizon — the 415 km","<p>For the Love in Motion run from Attunga to Sydney, training shifts to multi-day endurance: huge weekly volume, back-to-back long days as the main event, and recovery built around running again tomorrow.</p><p>We'll build that block once K2PD is done. Every consistent week now is the foundation it stands on.</p>");

/* ---------- go ---------- */
function render(){renderPhases();renderPlans();renderWeeks();renderHead();renderList();renderNotes();}
renderCount();render();

if("serviceWorker" in navigator){addEventListener("load",function(){navigator.serviceWorker.register("../sw.js").catch(function(){});});}
